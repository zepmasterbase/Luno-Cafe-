<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luno Café Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    html{
      scroll-behavior:smooth;
      scroll-padding-top:120px;
    }

    body{
      background:#f5f5f2;
      color:#111;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
    }

    img{
      width:100%;
      display:block;
      object-fit:cover;
    }

    .navbar{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:1250px;
      padding:16px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      border-radius:30px;
      backdrop-filter:blur(22px);
      background:rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 10px 40px rgba(0,0,0,0.18);
    }

    .logo{
      color:white;
      font-size:22px;
      font-weight:700;
      letter-spacing:1px;
    }

    .nav-links{
      display:flex;
      gap:24px;
      align-items:center;
    }

    .nav-links a{
      color:rgba(255,255,255,0.85);
      font-size:14px;
      transition:.3s;
    }

    .nav-links a:hover{
      color:white;
    }

    /* NEW HOME BUTTON */
    .home-btn{
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.25);
      color:white;
      font-size:14px;
      transition:.3s;
    }

    .home-btn:hover{
      background:white;
      color:black;
    }

    .hero{
      height:70vh;
      background:
      linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
      url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
      padding:40px;
    }

    /* IMPROVED READABILITY */
    .hero h1{
      text-shadow:0 10px 40px rgba(0,0,0,0.6);
    }

    .hero p{
      text-shadow:0 8px 30px rgba(0,0,0,0.5);
    }

    .hero-content{
      max-width:850px;
    }

    .hero-badge{
      display:inline-block;
      padding:12px 20px;
      border-radius:100px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      margin-bottom:24px;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .hero h1{
      font-size:clamp(62px,10vw,130px);
      line-height:.9;
      letter-spacing:-5px;
      margin-bottom:24px;
      font-weight:800;
    }

    .hero p{
      color:rgba(255,255,255,0.82);
      line-height:1.9;
      font-size:20px;
      max-width:700px;
      margin:auto;
    }

    .menu-section{
      padding:110px 7%;
    }

    .section-header{
      text-align:center;
      margin-bottom:70px;
    }

    .section-header span{
      color:#777;
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:13px;
    }

    .section-header h2{
      font-size:clamp(42px,7vw,82px);
      letter-spacing:-3px;
      margin-top:10px;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .menu-card{
      background:rgba(255,255,255,0.75);
      border:1px solid rgba(255,255,255,0.7);
      backdrop-filter:blur(16px);
      border-radius:36px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.08);
      transition:.35s ease;
      position:relative;
    }

    .menu-card:hover{
      transform:translateY(-10px) scale(1.02);
    }

    .menu-card img{
      height:260px;
      object-fit:cover;
    }

    .popular-tag{
      position:absolute;
      top:18px;
      left:18px;
      background:#0b5a4e;
      color:white;
      padding:10px 16px;
      border-radius:100px;
      font-size:12px;
      font-weight:600;
      backdrop-filter:blur(10px);
      box-shadow:0 5px 20px rgba(0,0,0,0.18);
    }

    .menu-content{
      padding:28px;
    }

    .menu-content h3{
      font-size:28px;
      margin-bottom:12px;
      letter-spacing:-1px;
    }

    .menu-content p{
      color:#666;
      line-height:1.8;
      margin-bottom:22px;
    }

    .price{
      font-size:34px;
      color:#0b5a4e;
      font-weight:700;
      margin-bottom:24px;
    }

    .whatsapp-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:#0b5a4e;
      color:white;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      transition:.3s ease;
    }

    .whatsapp-btn:hover{
      transform:scale(1.02);
      background:#083f37;
    }

    .categories{
      margin-top:90px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:30px;
    }

    .category-card{
      background:white;
      border-radius:34px;
      padding:38px;
      box-shadow:0 15px 50px rgba(0,0,0,0.05);
    }

    .category-card h3{
      font-size:30px;
      margin-bottom:24px;
      color:#0b5a4e;
    }

    .menu-item{
      display:flex;
      justify-content:space-between;
      padding:16px 0;
      border-bottom:1px solid #eee;
      align-items:center;
      gap:20px;
    }

    .menu-item:last-child{
      border-bottom:none;
    }

    .item-info h4{
      font-size:16px;
      margin-bottom:6px;
    }

    .item-info p{
      font-size:13px;
      color:#777;
    }

    .item-price{
      font-weight:700;
      color:#0b5a4e;
    }

    .small-whatsapp{
      background:#0b5a4e;
      color:white;
      border:none;
      padding:10px 16px;
      border-radius:14px;
      font-size:12px;
      cursor:pointer;
      transition:.3s;
    }

    .small-whatsapp:hover{
      background:#083f37;
    }

    .floating-whatsapp{
      position:fixed;
      right:24px;
      bottom:24px;
      width:70px;
      height:70px;
      border-radius:50%;
      background:#25D366;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:34px;
      z-index:9999;
      box-shadow:0 10px 30px rgba(37,211,102,.4);
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.08);}
      100%{transform:scale(1);}
    }

    .footer{
      background:#0c0c0c;
      color:white;
      text-align:center;
      padding:100px 7%;
      margin-top:120px;
    }

    .footer h2{
      font-size:64px;
      letter-spacing:-3px;
      margin-bottom:20px;
    }

    .footer p{
      color:rgba(255,255,255,0.7);
      max-width:700px;
      margin:auto;
      line-height:1.9;
    }

    .footer-links{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:40px;
    }

    .footer-links a{
      color:white;
      padding:14px 22px;
      border-radius:100px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      transition:.3s;
    }

    .footer-links a:hover{
      background:white;
      color:black;
    }

    @media(max-width:768px){

      .navbar{
        width:95%;
        padding:14px 20px;
      }

      .nav-links{
        display:none;
      }

      .hero{
        padding-top:120px;
      }

      .menu-item{
        flex-direction:column;
        align-items:flex-start;
      }

    }

  </style>
</head>

<body>

  <nav class="navbar">

    <div class="logo">LUNO CAFÉ</div>

    <div class="nav-links">
      <a class="home-btn" href="index.html">Home</a>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
    </div>

  </nav>

  <section class="hero">

    <div class="hero-content">

      <div class="hero-badge">
        Premium Menu • Crafted for the Students Economy
      </div>

      <h1>Breakfast.<br>Coffee.<br>Vibes.</h1>

      <p>
        Beautiful food, premium coffee and aesthetic experiences designed
        for creators, students and modern café culture.
      </p>

    </div>

  </section>

  <!-- EVERYTHING ELSE REMAINS UNCHANGED -->

  <!-- (rest of your code stays exactly the same) -->

</body>
</html>
